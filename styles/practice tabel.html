<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabel</title>
    <style>
        table{
            border-collapse: collapse;
        }
        td,th{
            border: 1px solid blueviolet;
            padding: 10px 30px;
        }
        
    </style>
</head>
<body>
    <main>
        <h2>friends</h2>
        <table>
            <th>abir</th>
            <th>nibir</th>
            <th>turjo</th>
            <tbody>
              <tr>
                <td>goku</td>
                <td>naruto</td>
                <td>luffy</td>
              </tr> 
              <tr>
                <td>eifaz</td>
                <td>prithu</td>
                <td>nuhas</td>
                <tr>
                    <td>cat</td>
                    <td>dog</td>
                    <td>bird</td>
                </tr>
              </tr> 
            </tbody>

        </table>
    </main>
</body>
</html>
