<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex</title>
    <style>
        .container{
            display: flex;
        }
    .container div{
       border: 2px solid purple;
       height: 100px;
       width: 200px;
       font-size: 3em;
       display: flex;


    }
    .box{
        font-size: 4rem;
        height: 100px;
        width: 100px;
        border: 2px solid palevioletred;
    }
    .box-container{
        display: flex;
        gap: 50px;
    }
    .div{
        border: 2px;
        font-size: 4rem;
        height: 100px;
        width: 100px;
        border: 5px solid peru;
    }
    .card-container{
        display: flex;
        gap: 4px;
    }
    
    
    </style>
</head>
<body>
    <div class="container">
     <div>1</div>
    <div>2</div>
    <div>3</div>
    <div>4</div>
    <div>4</div>
    <div>4</div>
    </div>
    <div class="box-container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>
        <div class="box">7</div>
    </div>
    <div class="card-container">
        <div class="div">1</div>
        <div class="div">2</div>
        <div class="div">3</div>
        <div class="div">4</div>
        <div class="div">5</div>
        <div class="div">6</div>
        <div class="div">7</div>
    </div>
</html>
